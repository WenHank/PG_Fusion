version: '3.8'
services:
  db:
    image: ankane/pgvector:latest
    container_name: pg_fusion_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bikestores
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: